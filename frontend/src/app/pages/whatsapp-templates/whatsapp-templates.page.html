<ion-header>
  <app-toolbar [title]="'WhatsApp Templates'"></app-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="loadTemplates($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="header-info">
    <p>Manage your custom WhatsApp message templates.</p>
  </div>

  <div *ngIf="isLoading" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
  </div>

  <div *ngIf="!isLoading && templates.length === 0" class="empty-state">
    <p>No templates found.</p>
  </div>

  <ion-list *ngIf="!isLoading && templates.length > 0" lines="none">
    <ion-card *ngFor="let template of templates" class="template-card" (click)="openEditModal(template)">
      <ion-card-header>
        <div class="card-header-content">
          <ion-card-title>{{ template.name }}</ion-card-title>
          <ion-badge *ngIf="template.is_default" color="primary">Default</ion-badge>
        </div>
      </ion-card-header>
      <ion-card-content>
        <p class="template-preview">{{ template.message }}</p>
      </ion-card-content>
      <div class="card-actions" *ngIf="!template.is_default">
        <ion-button fill="clear" color="danger" (click)="confirmDelete(template.template_id, $event)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
    </ion-card>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openAddModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="cancelModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="cancelModal()">Cancel</ion-button>
          </ion-buttons>
          <ion-title>{{ isEditing ? 'Edit Template' : 'New Template' }}</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="saveTemplate()" [strong]="true">Save</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item class="form-item">
          <ion-label position="stacked">Template Name</ion-label>
          <ion-input [(ngModel)]="currentTemplate.name" placeholder="e.g. Friendly Reminder"></ion-input>
        </ion-item>
        <br>
        <ion-item class="form-item">
          <ion-label position="stacked">Message</ion-label>
          <ion-textarea [(ngModel)]="currentTemplate.message" rows="10" placeholder="Type your message here... Use {name} for member name."></ion-textarea>
        </ion-item>
        <p class="hint-text">
          Tip: You can use <strong>&#123;name&#125;</strong> to insert the member's name automatically.
        </p>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
